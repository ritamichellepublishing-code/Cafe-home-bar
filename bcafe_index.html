<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>☕ Home Barista Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Cormorant+Garamond:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fcfaf7;
      --panel: #ffffff;
      --text: #2f241c;
      --muted: #8d7a6b;
      --accent: #8a5a2b;
      --accent-light: #f4ece4;
      --line: rgba(138, 90, 43, 0.1);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--bg);
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      line-height: 1.5;
      padding-bottom: calc(90px + var(--safe-bottom));
    }

    header {
      padding: 2rem 1.2rem 1rem;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .app-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 600;
      color: #3a271a;
    }
    .app-logo em { color: var(--accent); font-style: italic; }

    .pantry-section {
      background: var(--panel);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 1.2rem 0;
      margin-bottom: 1rem;
    }

    .section-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      font-weight: 800;
      padding: 0 1.2rem 0.8rem;
    }

    .scroll-tray {
      display: flex;
      overflow-x: auto;
      padding: 0 1.2rem;
      gap: 0.6rem;
      scrollbar-width: none;
    }
    .scroll-tray::-webkit-scrollbar { display: none; }

    .pill {
      white-space: nowrap;
      padding: 0.6rem 1rem;
      border-radius: 100px;
      background: var(--accent-light);
      border: 1px solid transparent;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
      transition: all 0.2s ease;
    }
    .pill.on { background: var(--accent); color: white; }

    .menu-container { padding: 0 1.2rem; }

    .drink-card {
      background: var(--panel);
      border-radius: 18px;
      margin-bottom: 1rem;
      border: 1px solid var(--line);
      overflow: hidden;
      transition: border 0.3s ease;
    }
    .drink-card.match { border: 2px solid var(--accent); }

    .card-trigger { padding: 1.2rem; display: flex; justify-content: space-between; align-items: center; }
    .drink-name { font-weight: 700; font-size: 1.05rem; color: #3a271a; }
    .card-meta { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-top: 0.2rem; }

    .drink-details { display: none; padding: 0 1.2rem 1.2rem; border-top: 1px solid var(--line); background: #fafaf9; }
    .drink-details.open { display: block; }

    .step-item { margin-top: 1rem; display: flex; gap: 0.8rem; }
    .step-num {
      width: 22px; height: 22px; background: var(--accent); color: white;
      border-radius: 6px; font-size: 0.7rem; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0; font-weight: 800;
    }
    .step-text { font-size: 0.9rem; color: #4f3c2d; }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(255, 255, 255, 0.98);
      border-top: 1px solid var(--line);
      display: flex; justify-content: space-around;
      padding: 0.8rem 0 calc(0.8rem + var(--safe-bottom));
      z-index: 100;
    }
    .nav-item {
      background: none; border: none; font-size: 0.65rem; font-weight: 700;
      color: var(--muted); display: flex; flex-direction: column; align-items: center; gap: 0.3rem;
    }
    .nav-item.active { color: var(--accent); }
    .nav-icon { font-size: 1.2rem; }
  </style>
</head>
<body>

  <header>
    <div class="app-logo">Barista <em>Daily</em></div>
  </header>

  <section class="pantry-section">
    <div class="section-label">What's in your pantry?</div>
    <div class="scroll-tray" id="pills">
      <span class="pill" data-i="espresso">Espresso</span>
      <span class="pill" data-i="oat-milk">Oat Milk</span>
      <span class="pill" data-i="white-choc">White Choc</span>
      <span class="pill" data-i="caramel">Caramel</span>
      <span class="pill" data-i="vanilla">Vanilla</span>
      <span class="pill" data-i="cold-foam">Cold Foam</span>
      <span class="pill" data-i="whip">Whipped Cream</span>
      <span class="pill" data-i="vodka">Vodka</span>
      <span class="pill" data-i="kahlua">Kahlúa</span>
      <span class="pill" data-i="hennessy">Hennessy</span>
      <span class="pill" data-i="ginger-beer">Ginger Beer</span>
      <span class="pill" data-i="lemon">Lemon</span>
    </div>
  </section>

  <main class="menu-container" id="menu"></main>

  <nav class="bottom-nav" id="filters">
    <button class="nav-item active" data-f="all"><span class="nav-icon">☕</span>All</button>
    <button class="nav-item" data-f="coffee"><span class="nav-icon">🥛</span>Coffee</button>
    <button class="nav-item" data-f="spirited"><span class="nav-icon">🍸</span>Spirited</button>
    <button class="nav-item" data-f="cocktail"><span class="nav-icon">🍹</span>Cocktails</button>
  </nav>

  <script>
    const drinks = [
      { id: 1, name: "White Choc Caramel Oat Latte", cat: "coffee", type: "Hot", ings: ["espresso", "oat-milk", "white-choc", "caramel", "whip"], steps: ["Base: 2oz hot espresso + 2 tsp white choc + 1 tsp caramel. Stir.", "Finish: Fill with 4-5oz steamed oat milk. Top with whip."] },
      { id: 2, name: "Salted Caramel White Mocha", cat: "coffee", type: "Iced", ings: ["espresso", "oat-milk", "white-choc", "caramel", "cold-foam"], steps: ["Base: 2oz hot espresso + 1 tbsp white choc + 1 tsp caramel.", "Finish: Add ice, 3oz oat milk, and sweet cream cold foam."] },
      { id: 3, name: '"Cafe Boutique" Macchiato', cat: "coffee", type: "Iced", ings: ["espresso", "oat-milk", "caramel", "cold-foam"], steps: ["Base: 2 tsp caramel + 4oz oat milk + ice.", "Finish: Pour 2oz espresso over top. Top with cold foam."] },
      { id: 4, name: "Iced Vanilla White Mocha", cat: "coffee", type: "Iced", ings: ["espresso", "oat-milk", "white-choc", "vanilla", "cold-foam"], steps: ["Base: 2oz espresso + 2 tsp white choc + 1 tsp vanilla.", "Finish: Add ice, 3oz oat milk, and cold foam + drizzle."] },
      { id: 5, name: 'Vanilla Caramel "Cloud"', cat: "coffee", type: "Hot", ings: ["espresso", "oat-milk", "vanilla", "caramel", "whip"], steps: ["Base: 2oz espresso + 1 tsp vanilla + 1 tsp caramel.", "Finish: Froth 4oz oat milk (airy), top with whip and caramel."] },
      { id: 6, name: "Double Vanilla Shaken Espresso", cat: "coffee", type: "Iced", ings: ["espresso", "oat-milk", "vanilla", "cold-foam"], steps: ["Base: Shake 3oz espresso, 1 tbsp vanilla, and ice for 15s.", "Finish: Pour into glass, top with 2oz oat milk and cold foam."] },
      { id: 12, name: "Durham Velvet", cat: "coffee", type: "Iced", ings: ["espresso", "oat-milk", "vanilla", "caramel", "cold-foam"], steps: ["Base: 2oz hot espresso + 1 tsp vanilla + 1 tsp caramel.", "Finish: Ice, 3oz oat milk, then spoon cold foam over top."] },
      { id: 7, name: "The Midnight Mocha", cat: "spirited", type: "Hot", ings: ["espresso", "hennessy", "oat-milk", "white-choc", "whip"], steps: ["Mix: 1oz Hennessy, 2oz hot coffee, 1 tbsp white choc.", "Finish: Top with steamed oat milk and whipped cream."] },
      { id: 8, name: "Kahlúa Cloud Latte", cat: "spirited", type: "Hot", ings: ["espresso", "kahlua", "oat-milk", "vanilla"], steps: ["Mix: 1oz Kahlúa, 2oz espresso, 1 tsp vanilla.", "Finish: Fill with aerated foamy oat milk."] },
      { id: 9, name: 'The "Dunkin" Spike', cat: "spirited", type: "Iced", ings: ["espresso", "kahlua", "oat-milk", "caramel", "cold-foam"], steps: ["Mix: 1oz Kahlúa, 2oz espresso, 1 tsp caramel.", "Build: Add ice and 3oz oat milk. Top with cold foam."] },
      { id: 11, name: 'The "Hen"', cat: "spirited", type: "Hot/Iced", ings: ["espresso", "hennessy", "white-choc", "oat-milk"], steps: ["Brew 2oz espresso over 1 tbsp white choc. Stir.", "Spirit: Add 1oz Hennessy. Chill with light ice.", "Finish: Top with 2oz oat milk and cinnamon."] },
      { id: 10, name: '"Perfect 10" Espresso Martini', cat: "cocktail", type: "Shaken", ings: ["espresso", "vodka", "kahlua", "vanilla"], steps: ["Cool 2oz espresso for 2-3 mins.", "Build: 2oz espresso, 1.5oz Vodka, 0.5oz Kahlúa, 1 tsp vanilla, pinch of salt.", "Shake hard with ice for 20s. Strain."] },
      { id: 13, name: "NC Gold Fashioned", cat: "cocktail", type: "Stirred", ings: ["hennessy", "caramel", "vanilla"], steps: ["Mix: 2 tsp caramel, 1 tsp vanilla, dash of water/salt.", "Spirit: Add 2oz Hennessy. Stir for 20s.", "Finish: Large ice cube and orange peel."] },
      { id: 14, name: "Vanilla Lemon Drop", cat: "cocktail", type: "Shaken", ings: ["vodka", "lemon", "vanilla"], steps: ["Shake 2oz Vodka, 1oz Lemon juice, 1 tbsp Vanilla for 15s.", "Strain into glass."] },
      { id: 15, name: 'Hennessy "Buck"', cat: "cocktail", type: "Build", ings: ["hennessy", "lemon", "ginger-beer"], steps: ["Fill glass with ice.", "Pour 1.5oz Hennessy and 0.5oz Lemon juice.", "Top with 4oz Ginger Beer. Stir once."] }
    ];

    let activeF = 'all';
    let haveIngs = new Set();
    let openId = null;

    function render() {
      const menu = document.getElementById('menu');
      const filtered = drinks.filter(d => {
        const typeMatch = activeF === 'all' || d.cat === activeF;
        const ingMatch = haveIngs.size === 0 || d.ings.every(i => haveIngs.has(i));
        return typeMatch && (haveIngs.size > 0 ? ingMatch : true);
      });

      menu.innerHTML = filtered.map(d => {
        const isMatch = haveIngs.size > 0 && d.ings.every(i => haveIngs.has(i));
        return `
          <div class="drink-card ${isMatch ? 'match' : ''}" onclick="toggle(${d.id})">
            <div class="card-trigger">
              <div>
                <div class="drink-name">${d.name}</div>
                <div class="card-meta">${d.type} • ${isMatch ? '✨ Ready to make' : 'Recipe'}</div>
              </div>
              <div style="color:var(--accent)">${openId === d.id ? '✕' : '→'}</div>
            </div>
            <div class="drink-details ${openId === d.id ? 'open' : ''}">
              ${d.steps.map((s, i) => `
                <div class="step-item">
                  <div class="step-num">${i+1}</div>
                  <div class="step-text">${s}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }).join('');
    }

    function toggle(id) { openId = openId === id ? null : id; render(); }

    document.getElementById('filters').addEventListener('click', e => {
      const btn = e.target.closest('.nav-item');
      if (!btn) return;
      activeF = btn.dataset.f;
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });

    document.getElementById('pills').addEventListener('click', e => {
      if (!e.target.classList.contains('pill')) return;
      const i = e.target.dataset.i;
      haveIngs.has(i) ? haveIngs.delete(i) : haveIngs.add(i);
      e.target.classList.toggle('on');
      render();
    });

    render();
  </script>
</body>
</html>
